version: '3.8'

services:
  chineseauction-api:
    build:
      context: .
      dockerfile: ChineseAuction.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - "ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ChineseAuctionDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      - "ConnectionStrings__Redis=chineseauction-redis:6379,password=YourSecureRedisPassword123"
    depends_on:
      - sqlserver
      - chineseauction-redis

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"

  chineseauction-redis:
    image: redis:7.2-alpine
    container_name: chineseauction-redis
    command: ["redis-server", "--requirepass", "YourSecureRedisPassword123"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
